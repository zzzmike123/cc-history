<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 历史查看器</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root {
  --bg-page: #F8FAFB;
  --bg-card: #FFFFFF;
  --bg-sidebar: #FFFFFF;
  --bg-hover: #F1F5F9;
  --bg-active: #E0F2FE;
  --bg-subtle: #F8FAFC;
  --border: #E2E8F0;
  --border-light: #F1F5F9;
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --accent: #0891B2;
  --accent-light: #E0F7FA;
  --accent-dark: #0E7490;
  --user-bg: #0891B2;
  --user-text: #FFFFFF;
  --assistant-bg: #FFFFFF;
  --assistant-text: #1E293B;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

[data-theme="dark"] {
  --bg-page: #0D1117;
  --bg-card: #161B22;
  --bg-sidebar: #161B22;
  --bg-hover: #1C2333;
  --bg-active: #1C3A5E;
  --bg-subtle: #1C2333;
  --border: #30363D;
  --border-light: #21262D;
  --text-primary: #E6EDF3;
  --text-secondary: #8B949E;
  --text-muted: #6E7681;
  --accent: #22D3EE;
  --accent-light: #164E63;
  --accent-dark: #06B6D4;
  --user-bg: #0E7490;
  --user-text: #CFFAFE;
  --assistant-bg: #1C2333;
  --assistant-text: #E6EDF3;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: text;
  -webkit-user-select: text;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

/* Header */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
  -webkit-app-region: drag;
  box-shadow: var(--shadow-sm);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), #06B6D4);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon svg { width: 18px; height: 18px; color: white; }
.logo-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}

.search-wrapper {
  flex: 1;
  max-width: 440px;
  position: relative;
  -webkit-app-region: no-drag;
}
.search-wrapper svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-wrapper input {
  width: 100%;
  padding: 8px 14px 8px 36px;
  background: var(--bg-page);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  transition: all 0.2s ease;
}
.search-wrapper input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-card);
  box-shadow: 0 0 0 3px rgba(8,145,178,0.1);
}
.search-wrapper input::placeholder { color: var(--text-muted); font-weight: 400; }

.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  display: none;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.search-clear:hover { background: var(--bg-hover); color: var(--text-primary); }
.search-clear svg { width: 12px; height: 12px; pointer-events: none; }
.search-clear.show { display: flex; }

.stats {
  display: flex;
  gap: 20px;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.stat-value { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }

/* Main Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 300px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-count { font-size: 11px; color: var(--text-muted); font-weight: 500; }

.project-list { flex: 1; overflow-y: auto; padding: 6px 8px; }

.project-item { margin: 2px 0; }

.project-header {
  padding: 8px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: var(--radius-sm);
  transition: all 0.15s ease;
  user-select: none;
}
.project-header:hover { background: var(--bg-hover); }

.project-arrow {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.project-item.expanded .project-arrow { transform: rotate(90deg); }

.project-info { flex: 1; min-width: 0; }
.project-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-path-text {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.project-badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
}

.session-list { display: none; padding: 2px 0 4px 20px; }
.project-item.expanded .session-list { display: block; }

.session-item {
  padding: 8px 10px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  margin: 1px 0;
  transition: all 0.15s ease;
  border-left: 2px solid transparent;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active {
  background: var(--bg-active);
  border-left-color: var(--accent);
}

.session-top { display: flex; justify-content: space-between; align-items: center; }
.session-time { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.session-right { display: flex; align-items: center; gap: 6px; }
.session-msgs { font-size: 10px; color: var(--text-muted); background: var(--bg-subtle); padding: 1px 6px; border-radius: 4px; font-weight: 500; }
.session-preview {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.5;
}

/* Content Area */
.content {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
}

.content-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-muted);
}
.content-empty svg { width: 56px; height: 56px; opacity: 0.3; }
.content-empty-text { font-size: 14px; font-weight: 500; }

/* Chat Header */
.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.chat-header-left { flex: 1; min-width: 0; }
.chat-title { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
.chat-meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 16px; }
.chat-meta-item { display: flex; align-items: center; gap: 5px; font-weight: 400; }
.chat-meta-item svg { width: 13px; height: 13px; }

.btn-resume {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  margin-top: 2px;
}
.btn-resume:hover { background: var(--accent-dark); box-shadow: var(--shadow-md); }
.btn-resume:active { transform: scale(0.97); }
.btn-resume svg { width: 14px; height: 14px; }
.btn-resume.loading { opacity: 0.7; pointer-events: none; }

.chat-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
.btn-action {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn-action:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-action svg { width: 14px; height: 14px; }

/* 对话内搜索 */
.chat-search-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-search-bar.show { display: flex; }

.chat-search-input {
  flex: 1;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: inherit;
  background: var(--bg-subtle);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s;
}
.chat-search-input:focus { border-color: var(--accent); }

.chat-search-info {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 60px;
  text-align: center;
}

.chat-search-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.chat-search-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.chat-search-btn svg { width: 14px; height: 14px; }

.chat-search-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.chat-search-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.chat-search-close svg { width: 14px; height: 14px; }

/* 搜索高亮 */
.search-highlight {
  background: #FDE68A;
  color: #1E293B;
  border-radius: 2px;
  padding: 0 1px;
}
.search-highlight.active {
  background: #F97316;
  color: white;
}

.session-fav {
  font-size: 14px;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.15s;
  user-select: none;
}
.session-fav:hover, .session-fav.active { color: #F59E0B; }

/* Stats view */
.stats-view { padding: 24px; overflow-y: auto; flex: 1; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.stats-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  text-align: center;
}
.stats-card-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stats-card-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.stats-section { margin-bottom: 24px; }
.stats-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
.stats-bar-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.stats-bar-name { font-size: 12px; color: var(--text-secondary); width: 180px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
.stats-bar-track { flex: 1; height: 20px; background: var(--bg-subtle); border-radius: 4px; overflow: hidden; }
.stats-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; min-width: 2px; }
.stats-bar-value { font-size: 11px; color: var(--text-muted); width: 50px; flex-shrink: 0; text-align: left; }

/* 30天趋势 */
.stats-trend { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; }
.stats-trend-bars { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
.stats-trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
.stats-trend-bar { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; }
.stats-trend-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; }

/* 每小时分布 */
.stats-hours { display: flex; align-items: flex-end; gap: 2px; height: 100px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 8px 8px; }
.stats-hour-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
.stats-hour-bar { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; opacity: 0.8; }
.stats-hour-label { font-size: 9px; color: var(--text-muted); margin-top: 4px; }

/* 每周分布 */
.stats-weekdays { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 16px 8px; }
.stats-weekday-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
.stats-weekday-bar { width: 100%; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.3s; }
.stats-weekday-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* 工具使用 */
.stats-tools { display: flex; flex-direction: column; gap: 8px; }
.stats-tool-item { display: flex; align-items: center; gap: 12px; }
.stats-tool-name { font-size: 12px; color: var(--text-secondary); width: 100px; flex-shrink: 0; text-align: right; font-weight: 500; }
.stats-tool-track { flex: 1; height: 24px; background: var(--bg-subtle); border-radius: 4px; overflow: hidden; }
.stats-tool-fill { height: 100%; border-radius: 4px; transition: width 0.3s; min-width: 2px; }
.stats-tool-value { font-size: 12px; color: var(--text-primary); width: 80px; flex-shrink: 0; font-weight: 500; }

/* Skills & Plugins */
.skills-plugins-view { padding: 24px; overflow-y: auto; flex: 1; }
.skills-plugins-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.skills-plugins-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
.skills-plugins-tabs { display: flex; gap: 8px; }
.skills-plugins-tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-subtle);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.skills-plugins-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
.skills-plugins-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

.skills-plugins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

.skill-card, .plugin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  transition: all 0.2s;
}
.skill-card:hover, .plugin-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.skill-card-header, .plugin-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.skill-icon, .plugin-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.skill-icon { background: var(--accent); color: white; }
.plugin-icon { background: #8b5cf6; color: white; }
.skill-icon svg, .plugin-icon svg { width: 20px; height: 20px; }

.skill-name, .plugin-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.skill-scope, .plugin-scope {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-subtle);
  color: var(--text-muted);
  margin-left: auto;
}
.skill-scope.user, .plugin-scope.user { background: #dbeafe; color: #1e40af; }
.skill-scope.project, .plugin-scope.project { background: #dcfce7; color: #166534; }

.skill-description, .plugin-description {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.skill-meta, .plugin-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
.skill-meta-item, .plugin-meta-item { display: flex; align-items: center; gap: 4px; }
.skill-meta-item svg, .plugin-meta-item svg { width: 14px; height: 14px; }

.skills-plugins-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.skills-plugins-empty svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
.skills-plugins-empty p { font-size: 14px; }

/* Skill/Plugin 详情悬浮窗 */
.detail-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

.detail-modal-content {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.detail-modal-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.detail-modal-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.detail-modal-icon.skill { background: var(--accent); color: white; }
.detail-modal-icon.plugin { background: #8b5cf6; color: white; }
.detail-modal-icon svg { width: 24px; height: 24px; }

.detail-modal-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.detail-modal-close {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;

<script>
let projects = [];

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

function formatTime(ts) {
  if (!ts) return '';
  try {
    let d = new Date(ts);
    if (isNaN(d.getTime())) d = new Date(Number(ts));
    if (isNaN(d.getTime())) return ts;
    const now = new Date(), diff = now - d, oneDay = 86400000;
    if (diff < oneDay && d.getDate() === now.getDate()) return d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    if (diff < 2 * oneDay) return '昨天 ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'});
  } catch { return ts; }
}

function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function renderMarkdown(text) {
  let h = escapeHtml(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c}</code></pre>`);
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return h;
}

async function fetchJson(url, options) {
  const res = await fetch(url, options);
  let data = null;
  try { data = await res.json(); } catch { data = null; }
  if (!res.ok) throw new Error((data && data.error) || `请求失败 (${res.status})`);
  return data;
}

function showProjectError(message) {
  document.getElementById('projectList').innerHTML = `
    <div class="state-box state-error">
      <div class="state-title">加载失败</div>
      <div class="state-desc">${escapeHtml(message || '无法读取 Claude Code 历史')}</div>
      <button class="state-action" onclick="loadProjects()">重试</button>
    </div>`;
}

async function loadProjects() {
  const list = document.getElementById('projectList');
  list.innerHTML = '<div class="loading" id="loadingIndicator"><div class="spinner"></div> 加载中...</div>';
  try {
    const [loadedProjects, loadedNames, loadedFavs] = await Promise.all([
      fetchJson('/api/projects'),
      fetchJson('/api/custom-names'),
      fetchJson('/api/favorites')
    ]);
    projects = Array.isArray(loadedProjects) ? loadedProjects : [];
    customNames = loadedNames && typeof loadedNames === 'object' ? loadedNames : {};
    favorites = loadedFavs && typeof loadedFavs === 'object' ? loadedFavs : {};

    let ts=0,tm=0;
    for(const p of projects){const ss=Array.isArray(p.sessions)?p.sessions:[];ts+=ss.length;for(const s of ss)tm+=Number(s.messageCount)||0;}
    document.getElementById('stats').innerHTML = `
      <div class="stat"><span class="stat-value">${projects.length}</span><span class="stat-label">项目</span></div>
      <div class="stat"><span class="stat-value">${ts}</span><span class="stat-label">会话</span></div>
      <div class="stat"><span class="stat-value">${tm}</span><span class="stat-label">消息</span></div>
    `;
    document.getElementById('sidebarCount').textContent = ts+' 会话';
    renderProjectList();
  } catch(e) {
    showProjectError(e.message);
  }
}

function renderProjectList(filter='') {
  const list=document.getElementById('projectList'), lf=String(filter||'').toLowerCase();
  if(!projects.length){
    list.innerHTML='<div class="state-box"><div class="state-title">没有找到历史会话</div><div class="state-desc">请确认 Claude Code 已产生历史记录，或检查 ~/.claude/projects 是否存在。</div></div>';
    return;
  }

  // 收集收藏的会话
  const favSessions = [];
  for(const proj of projects){
    const allSessions=Array.isArray(proj.sessions)?proj.sessions:[];
    const realPath=String(proj.realPath||proj.name||'');
    for(const s of allSessions){
      if(favorites[s.sessionId]){
        favSessions.push({...s, realPath, projectDir: proj.projectDir||''});
      }
    }
  }

  let html='';

  // 收藏分组
  if(favSessions.length && !lf){
    html+=`<div class="project-item expanded" id="proj-favorites">
      <div class="project-header" onclick="toggleProject('favorites')">
        <div class="project-arrow"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg></div>
        <div class="project-info">
          <div class="project-name">⭐ 收藏</div>
          <div class="project-path-text">${favSessions.length} 个会话</div>
        </div>
        <span class="project-badge">${favSessions.length}</span>
      </div>
      <div class="session-list">`;
    for(const s of favSessions){
      const rp=encodeURIComponent(s.realPath);
      const cn=customNames[s.sessionId];
      const dispName=cn?escapeHtml(cn):escapeHtml(s.firstMessage);
      const origTitle=cn?escapeHtml(s.firstMessage):'';
      const tooltip=cn?`title="${origTitle}"`:'';
      html+=`<div class="session-item" id="sess-fav-${s.sessionId}" data-realpath="${rp}" data-orig="${escapeHtml(s.firstMessage)}" ${tooltip}>
        <div class="session-top">
          <span class="session-time">${formatTime(s.lastTimestamp)}</span>
          <span class="session-right">
            <span class="session-fav active" onclick="event.stopPropagation();toggleFavorite('${s.sessionId}')" title="取消收藏">★</span>
            <span class="session-msgs">${s.messageCount}</span>
          </span>
        </div>
        <div class="session-preview" onclick="loadMessages('${encodeURIComponent(s.projectDir)}','${s.sessionId}','${rp}')">${dispName}</div>
      </div>`;
    }
    html+='</div></div>';
  }

  // 项目分组
  for(const proj of projects){
    const allSessions=Array.isArray(proj.sessions)?proj.sessions:[];
    const realPath=String(proj.realPath||proj.name||'');
    const sessions=allSessions.filter(s=>{if(!lf)return true;return String(s.firstMessage||'').toLowerCase().includes(lf)||realPath.toLowerCase().includes(lf);});
    if(!sessions.length&&lf)continue;
    const totalMsgs=sessions.reduce((a,s)=>a+s.messageCount,0);
    const projId=proj.name.replace(/[^a-zA-Z0-9]/g,'_');
    html+=`<div class="project-item" id="proj-${projId}">
      <div class="project-header" onclick="toggleProject('${projId}')">
        <div class="project-arrow"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg></div>
        <div class="project-info">
          <div class="project-name">${escapeHtml(realPath)}</div>
          <div class="project-path-text">${totalMsgs} 条消息</div>
        </div>
        <span class="project-badge">${sessions.length}</span>
      </div>
      <div class="session-list">`;
    for(const s of sessions){
      const rp=encodeURIComponent(realPath);
      const cn=customNames[s.sessionId];
      const dispName=cn?escapeHtml(cn):escapeHtml(s.firstMessage);
      const origTitle=cn?escapeHtml(s.firstMessage):'';
      const tooltip=cn?`title="${origTitle}"`:'';
      const isFav=favorites[s.sessionId];
      html+=`<div class="session-item" id="sess-${s.sessionId}" data-realpath="${rp}" data-orig="${escapeHtml(s.firstMessage)}" ${tooltip} onclick="loadMessages('${encodeURIComponent(proj.projectDir||'')}','${s.sessionId}','${rp}')" oncontextmenu="showContextMenu(event,'${s.sessionId}','${escapeHtml(s.firstMessage).replace(/'/g,"\\'")}')">
        <div class="session-top">
          <span class="session-time">${formatTime(s.lastTimestamp)}</span>
          <span class="session-right">
            <span class="session-fav ${isFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${s.sessionId}')" title="${isFav?'取消收藏':'收藏'}">${isFav?'★':'☆'}</span>
            <span class="session-msgs">${s.messageCount}</span>
          </span>
        </div>
        <div class="session-preview">${dispName}</div>
      </div>`;
    }
    html+='</div></div>';
  }
  if(!html)html='<div class="search-empty">没有匹配的结果</div>';
  list.innerHTML=html;
}

async function toggleFavorite(sessionId) {
  try {
    const data = await fetchJson('/api/favorites', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sessionId})
    });
    if(data.favorited) favorites[sessionId] = true;
    else delete favorites[sessionId];
    renderProjectList();
  } catch(e) { console.error(e); }
}

  if(currentSessionId===sessionId && !searchKeyword)return;
  currentSessionId=sessionId;

  // 清理旧的搜索状态，防止内存泄漏
  window._chatMessages = null;
  window._chatSearchResults = [];
  window._chatSearchIndex = -1;
  clearTimeout(chatSearchTimer);

  document.querySelectorAll('.session-item').forEach(el=>el.classList.remove('active'));
  const sessEl=document.getElementById('sess-'+sessionId);
  if(sessEl){sessEl.classList.add('active');const p=sessEl.closest('.project-item');if(p&&!p.classList.contains('expanded'))p.classList.add('expanded');}
  const projectDir=decodeURIComponent(encodedProjectDir);
  const realPath=decodeURIComponent(encodedRealPath||'');
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div> 加载中...</div>';
  let messages=[];
  try {
    messages=await fetchJson(`/api/messages?projectDir=${encodeURIComponent(projectDir)}&sessionId=${encodeURIComponent(sessionId)}`);
  } catch(e) {
    content.innerHTML=`<div class="content-empty"><div class="content-empty-text">读取会话失败：${escapeHtml(e.message)}</div></div>`;
    return;
  }
  if(!messages.length){content.innerHTML='<div class="content-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;opacity:0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div class="content-empty-text">该会话没有可显示的消息</div></div>';return;}
  const cn=customNames[sessionId];
  const chatTitle=cn||`会话 ${sessionId.slice(0,8)}`;
  const titleTooltip=cn?`title="原始: 会话 ${sessionId.slice(0,8)}"`:'';
  let html=`<div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-title" ${titleTooltip}>${escapeHtml(chatTitle)}</div>
      <div class="chat-meta">
        <span class="chat-meta-item">${iconFolder} ${escapeHtml(realPath||projectDir)}</span>
        <span class="chat-meta-item">${iconMsg} ${messages.length} 条消息</span>
      </div>
    </div>
    <div class="chat-actions">
      <button class="btn-action" onclick="toggleChatSearch()" title="在对话中搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        搜索
      </button>
      <button class="btn-action" onclick="exportSession('${sessionId}')" title="导出为 Markdown">
        ${iconExport} 导出
      </button>
      <button class="btn-resume" onclick="resumeSession('${sessionId}','${encodeURIComponent(realPath)}')" title="在 PowerShell 中继续此对话">
        ${iconTerminal} 继续对话
      </button>
    </div>
  </div>
  <div class="chat-search-bar" id="chatSearchBar">
    <input type="text" class="chat-search-input" id="chatSearchInput" placeholder="搜索对话内容..." oninput="debounceChatSearch()" onkeydown="if(event.key==='Escape'){toggleChatSearch()}else if(event.key==='Enter'){chatSearchNext()}">
    <span class="chat-search-info" id="chatSearchInfo"></span>
    <button class="chat-search-btn" onclick="chatSearchPrev()" title="上一个">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>
    <button class="chat-search-btn" onclick="chatSearchNext()" title="下一个">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
    <button class="chat-search-close" onclick="toggleChatSearch()" title="关闭搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="messages">`;
  for(const msg of messages){
    const av=msg.role==='user'?iconUser:iconBot;
    html+=`<div class="message ${msg.role}">
      <div class="msg-avatar">${av}</div>
      <div class="msg-body"><div class="msg-bubble" data-raw="${escapeHtml(msg.content)}">${renderMarkdown(msg.content)}</div><div class="msg-time">${formatTime(msg.timestamp)}</div></div>
    </div>`;
  }
  html+='</div>';
  content.innerHTML=html;

  // 存储原始消息用于搜索
  window._chatMessages = messages;
  window._chatSearchResults = [];
  window._chatSearchIndex = -1;

  // 如果有搜索关键词，自动打开搜索并定位
  if (searchKeyword) {
    const keyword = decodeURIComponent(searchKeyword);
    toggleChatSearch();
    const input = document.getElementById('chatSearchInput');
    if (input) {
      input.value = keyword;
      doChatSearch();
    }
  }
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){renderProjectList();return;}
  const list=document.getElementById('projectList');
  list.innerHTML='<div class="loading"><div class="spinner"></div> 搜索中...</div>';
  let results=[];
  try {
    results=await fetchJson(`/api/search?q=${encodeURIComponent(q)}`);
  } catch(e) {
    list.innerHTML=`<div class="state-box state-error"><div class="state-title">搜索失败</div><div class="state-desc">${escapeHtml(e.message)}</div></div>`;
    return;
  }
  if(!results.length){list.innerHTML='<div class="search-empty">没有找到匹配的消息</div>';return;}
  let html=`<div class="search-header">找到 ${results.length} 条结果</div>`;
  for(const r of results){
    const rp=encodeURIComponent(r.realProjectPath||'');

    html+=`<div class="search-result" onclick="loadMessages('${encodeURIComponent(r.projectDir)}','${r.sessionId}','${rp}','${searchQ}')">

      <div class="sr-content"><span class="sr-role ${r.role}">${r.role==='user'?'你':'AI'}</span>${escapeHtml(r.content)}</div>
    </div>`;
  }
  list.innerHTML=html;
}

function toggleChatSearch() {

function clearChatSearch() {
  window._chatSearchResults = [];
  window._chatSearchIndex = -1;
  const info = document.getElementById('chatSearchInfo');
  if (info) info.textContent = '';
  // 清除所有高亮 - 重新渲染
  document.querySelectorAll('.msg-bubble').forEach(bubble => {
    const raw = bubble.getAttribute('data-raw');
    if (raw) bubble.innerHTML = renderMarkdown(raw);
  });
}

// 在文本节点中高亮关键词（不破坏 HTML 结构）
function highlightInElement(element, keyword) {
  const highlights = [];
  const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

  // 使用 TreeWalker 遍历所有文本节点
  const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(node => {
    const text = node.textContent;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;

    // 创建文档片段替换文本节点
    const frag = document.createDocumentFragment();
    let lastIdx = 0;
    regex.lastIndex = 0;  // test() 会推进 lastIndex，exec 前需重置
    let match;

    while ((match = regex.exec(text)) !== null) {
      // 匹配前的文本
      if (match.index > lastIdx) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      }
      // 高亮的匹配文本
      const span = document.createElement('span');
      span.className = 'search-highlight';
      span.textContent = match[0];
      frag.appendChild(span);
      highlights.push(span);
      lastIdx = match.index + match[0].length;
    }
    // 剩余文本
    if (lastIdx < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
    node.parentNode.replaceChild(frag, node);
  });

  return highlights;
}

let chatSearchTimer = null;
function debounceChatSearch() { clearTimeout(chatSearchTimer); chatSearchTimer = setTimeout(doChatSearch, 200); }

function doChatSearch() {
  const input = document.getElementById('chatSearchInput');
  const info = document.getElementById('chatSearchInfo');
  if (!input || !info) return;

  const keyword = input.value.trim();
  clearChatSearch();

  if (!keyword) {
    info.textContent = '';
    return;
  }

  // 搜索并高亮
  const results = [];
  document.querySelectorAll('.msg-bubble').forEach(bubble => {
    const raw = bubble.getAttribute('data-raw');
    if (!raw) return;

    const lower = raw.toLowerCase();
    if (!lower.includes(keyword.toLowerCase())) return;

    // 先渲染 markdown
    bubble.innerHTML = renderMarkdown(raw);
    // 然后在渲染后的 DOM 中高亮
    const highlights = highlightInElement(bubble, keyword);
    results.push(...highlights);
  });

  window._chatSearchResults = results;
  window._chatSearchIndex = results.length > 0 ? 0 : -1;

  if (results.length > 0) {
    info.textContent = `1/${results.length}`;
    results[0].classList.add('active');
    results[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    info.textContent = '无结果';
  }
}

function chatSearchNext() {
  const results = window._chatSearchResults || [];
  if (results.length === 0) return;

  // 移除当前高亮
  if (window._chatSearchIndex >= 0 && window._chatSearchIndex < results.length) {
    results[window._chatSearchIndex].classList.remove('active');
  }

  // 移动到下一个
  window._chatSearchIndex = (window._chatSearchIndex + 1) % results.length;
  results[window._chatSearchIndex].classList.add('active');
  results[window._chatSearchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

  const info = document.getElementById('chatSearchInfo');
  if (info) info.textContent = `${window._chatSearchIndex + 1}/${results.length}`;
}

function chatSearchPrev() {
  const results = window._chatSearchResults || [];
  if (results.length === 0) return;

  // 移除当前高亮
  if (window._chatSearchIndex >= 0 && window._chatSearchIndex < results.length) {
    results[window._chatSearchIndex].classList.remove('active');
  }

  // 移动到上一个
  window._chatSearchIndex = (window._chatSearchIndex - 1 + results.length) % results.length;
  results[window._chatSearchIndex].classList.add('active');
  results[window._chatSearchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

  const info = document.getElementById('chatSearchInfo');
  if (info) info.textContent = `${window._chatSearchIndex + 1}/${results.length}`;
}

// Settings
let currentSettings = {};

async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    currentSettings = await res.json();
    applyTheme(currentSettings.theme || 'light');
  } catch {}
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeLight').classList.toggle('active', theme === 'light');
  document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
}

function selectTheme(theme) {
  document.getElementById('themeLight').classList.toggle('active', theme === 'light');
  document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
}

function openSettings() {
  document.getElementById('settingClaudeDir').value = currentSettings.claude_dir || '';
  selectTheme(currentSettings.theme || 'light');
  document.getElementById('settingsOverlay').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

async function saveSettings() {
  const claudeDir = document.getElementById('settingClaudeDir').value.trim();
  const theme = document.getElementById('themeDark').classList.contains('active') ? 'dark' : 'light';

  try {
    const res = await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ claude_dir: claudeDir, theme }),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }

    currentSettings = data.settings;
    applyTheme(currentSettings.theme);
    closeSettings();

    // 重新加载数据
    loadProjects();
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

// 等待页面完全加载后再请求数据
async function initApp() {
  await loadSettings();
  await loadProjects();
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>setTimeout(initApp,100));}else{setTimeout(initApp,100);}

async function resumeSession(sessionId, encodedRealPath){
  const realPath=decodeURIComponent(encodedRealPath);
  const btn=document.querySelector('.btn-resume');
  if(btn){btn.classList.add('loading');btn.innerHTML='<div class="spinner" style="width:14px;height:14px;border-width:2px"></div> 启动中...';}
  try{
    const data=await fetchJson(`/api/resume?sessionId=${encodeURIComponent(sessionId)}`);
    if(data.ok){
      if(btn){btn.innerHTML=iconTerminal+' 已启动';btn.style.background='var(--green,#22c55e)';}
      setTimeout(()=>{if(btn){btn.classList.remove('loading');btn.innerHTML=iconTerminal+' 继续对话';btn.style.background='';}},2000);
    }else{
      alert('启动失败: '+(data.error||'未知错误'));
      if(btn){btn.classList.remove('loading');btn.innerHTML=iconTerminal+' 继续对话';}
    }
  }catch(e){
    alert('启动失败: '+e.message);
    if(btn){btn.classList.remove('loading');btn.innerHTML=iconTerminal+' 继续对话';}
  }
}

async function exportSession(sessionId) {
  try {
    const res = await fetch(`/api/export?sessionId=${encodeURIComponent(sessionId)}`);
    if (!res.ok) throw new Error('导出失败');
    const content = await res.text();
    const filename = `session-${sessionId.slice(0,8)}.md`;

    // 优先用 pywebview 原生保存对话框
    if (window.pywebview && window.pywebview.api) {
      const result = await window.pywebview.api.save_file(filename, content);
      if (result.ok) {
        alert('导出成功！\n' + result.path);
        return;
      }
      // 用户取消了对话框
      return;
    }

    // 回退：浏览器下载
    const blob = new Blob([content], {type: 'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败: ' + e.message);
  }
}

async function showStats() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> 加载统计...</div>';
  try {
    const stats = await fetchJson('/api/stats');

    // 工具使用总数
    const toolTotal = Object.values(stats.toolUsage || {}).reduce((a, b) => a + b, 0);
    const toolColors = ['#0891B2', '#06B6D4', '#22D3EE', '#67E8F9', '#A5F3FC', '#CFFAFE', '#164E63', '#155E75', '#0E7490', '#0C4A6E'];

    let html = `<div class="stats-view">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:18px;font-weight:700;color:var(--text-primary)">统计面板</h2>
        <button class="btn-action" onclick="document.getElementById('content').innerHTML='<div class=\\'content-empty\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><path d=\\'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\\'></path></svg><div class=\\'content-empty-text\\'>选择一个会话开始查看</div></div>'">${iconBack} 返回</button>
      </div>

      <div class="stats-grid">
        <div class="stats-card"><div class="stats-card-value">${stats.totalProjects}</div><div class="stats-card-label">项目</div></div>
        <div class="stats-card"><div class="stats-card-value">${stats.totalSessions}</div><div class="stats-card-label">会话</div></div>
        <div class="stats-card"><div class="stats-card-value">${stats.totalMessages}</div><div class="stats-card-label">消息</div></div>
      </div>

      <!-- 30天趋势 -->
      <div class="stats-section">
        <div class="stats-section-title">最近 30 天消息趋势</div>
        <div class="stats-trend">
          <div class="stats-trend-bars">`;

    const maxTrend = Math.max(...stats.trend.map(d => d.count), 1);
    for (const d of stats.trend) {
      const h = Math.max(2, Math.round((d.count / maxTrend) * 100));
      const day = d.date.slice(5); // MM-DD
      html += `<div class="stats-trend-col" title="${d.date}: ${d.count}条">
        <div class="stats-trend-bar" style="height:${h}%"></div>
        <div class="stats-trend-label">${day.slice(-2)}</div>
      </div>`;
    }

    html += `</div></div></div>

      <!-- 每小时分布 -->
      <div class="stats-section">
        <div class="stats-section-title">每小时活跃分布</div>
        <div class="stats-hours">`;

    const maxHour = Math.max(...stats.hourly, 1);
    for (let h = 0; h < 24; h++) {
      const pct = Math.round((stats.hourly[h] / maxHour) * 100);
      html += `<div class="stats-hour-col">
        <div class="stats-hour-bar" style="height:${Math.max(2, pct)}%"></div>
        <div class="stats-hour-label">${h}</div>
      </div>`;
    }

    html += `</div></div>

      <!-- 每周分布 -->
      <div class="stats-section">
        <div class="stats-section-title">每周活跃分布</div>
        <div class="stats-weekdays">`;

    const weekNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    const maxWeek = Math.max(...stats.weekday, 1);
    for (let d = 0; d < 7; d++) {
      const pct = Math.round((stats.weekday[d] / maxWeek) * 100);
      html += `<div class="stats-weekday-col">
        <div class="stats-weekday-bar" style="height:${Math.max(2, pct)}%"></div>
        <div class="stats-weekday-label">${weekNames[d]}</div>
      </div>`;
    }

    html += `</div></div>

      <!-- 工具使用 -->
      <div class="stats-section">
        <div class="stats-section-title">工具使用排行（共 ${toolTotal} 次）</div>
        <div class="stats-tools">`;

    const tools = Object.entries(stats.toolUsage || {});
    for (let i = 0; i < tools.length; i++) {
      const [name, count] = tools[i];
      const pct = Math.round((count / toolTotal) * 100);
      const color = toolColors[i % toolColors.length];
      html += `<div class="stats-tool-item">
        <div class="stats-tool-name">${escapeHtml(name)}</div>
        <div class="stats-tool-track"><div class="stats-tool-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="stats-tool-value">${count} <span style="color:var(--text-muted)">(${pct}%)</span></div>
      </div>`;
    }

    html += `</div></div>

      <!-- 项目消息排行 -->
      <div class="stats-section">
        <div class="stats-section-title">项目消息排行</div>`;

    const maxMsgs = Math.max(...stats.byProject.map(p => p.messages), 1);
    for (const p of stats.byProject) {
      const pct = Math.round((p.messages / maxMsgs) * 100);
      html += `<div class="stats-bar-item">
        <div class="stats-bar-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
        <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%"></div></div>
        <div class="stats-bar-value">${p.messages}</div>
      </div>`;
    }

    html += '</div></div>';
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="content-empty"><div class="content-empty-text">加载统计失败：${escapeHtml(e.message)}</div></div>`;
  }
}

async function showSkillsPlugins() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> 加载 Skills & 插件...</div>';

  try {
    const [skills, plugins] = await Promise.all([
      fetchJson('/api/skills'),
      fetchJson('/api/plugins')
    ]);

    let currentTab = 'skills';

    // 显示详情悬浮窗
    window.showDetail = function(type, index) {
      const item = type === 'skill' ? skills[index] : plugins[index];
      if (!item) return;

      const modal = document.createElement('div');
      modal.className = 'detail-modal';
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };

      let bodyHtml = '';

      if (type === 'skill') {
        bodyHtml = `
          <div class="detail-section">
            <div class="detail-section-title">描述</div>
            <div class="detail-section-content">${escapeHtml(item.description || '暂无描述')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">作用域</div>
            <div class="detail-tags">
              <span class="detail-tag ${item.scope}">${item.scope === 'user' ? '用户级' : '项目级'}</span>
            </div>
          </div>
          ${item.license ? `
          <div class="detail-section">
            <div class="detail-section-title">许可证</div>
            <div class="detail-section-content">${escapeHtml(item.license)}</div>
          </div>` : ''}
          <div class="detail-section">
            <div class="detail-section-title">路径</div>
            <div class="detail-path">${escapeHtml(item.path)}</div>
          </div>`;
      } else {
        const installDate = item.installedAt ? new Date(item.installedAt).toLocaleString('zh-CN') : '未知';
        const updateDate = item.lastUpdated ? new Date(item.lastUpdated).toLocaleString('zh-CN') : '未知';
        bodyHtml = `
          <div class="detail-section">
            <div class="detail-section-title">版本</div>
            <div class="detail-section-content">${escapeHtml(item.version || '未知')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">作用域</div>
            <div class="detail-tags">
              <span class="detail-tag ${item.scope}">${item.scope === 'user' ? '用户级' : '项目级'}</span>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">安装时间</div>
            <div class="detail-section-content">${installDate}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">最后更新</div>
            <div class="detail-section-content">${updateDate}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">安装路径</div>
            <div class="detail-path">${escapeHtml(item.installPath)}</div>
          </div>`;
      }

      modal.innerHTML = `
        <div class="detail-modal-content">
          <div class="detail-modal-header">
            <div class="detail-modal-icon ${type}">${type === 'skill' ? iconSkills : iconPlugin}</div>
            <div class="detail-modal-title">${escapeHtml(item.name)}</div>
            <button class="detail-modal-close" onclick="this.closest('.detail-modal').remove()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          <div class="detail-modal-body">${bodyHtml}</div>
        </div>`;

      document.body.appendChild(modal);
    };

    function renderTab(tab) {
      currentTab = tab;
      const items = tab === 'skills' ? skills : plugins;
      const tabContent = document.getElementById('sp-tab-content');

      if (items.length === 0) {
        tabContent.innerHTML = `
          <div class="skills-plugins-empty">
            ${tab === 'skills' ? iconSkills : iconPlugin}
            <p>暂无${tab === 'skills' ? 'Skills' : '插件'}</p>
          </div>`;
        return;
      }

      let html = '<div class="skills-plugins-grid">';

      if (tab === 'skills') {
        for (let i = 0; i < items.length; i++) {
          const skill = items[i];
          html += `
            <div class="skill-card" onclick="showDetail('skill', ${i})">
              <div class="skill-card-header">
                <div class="skill-icon">${iconSkills}</div>
                <div>
                  <div class="skill-name">${escapeHtml(skill.name)}</div>
                </div>
                <span class="skill-scope ${skill.scope}">${skill.scope === 'user' ? '用户级' : '项目级'}</span>
              </div>
              <div class="skill-description">${escapeHtml(skill.description || '暂无描述')}</div>
              <div class="skill-meta">
                ${skill.license ? `<div class="skill-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>${escapeHtml(skill.license)}</div>` : ''}
              </div>
            </div>`;
        }
      } else {
        for (let i = 0; i < items.length; i++) {
          const plugin = items[i];
          const installDate = plugin.installedAt ? new Date(plugin.installedAt).toLocaleDateString('zh-CN') : '';
          html += `
            <div class="plugin-card" onclick="showDetail('plugin', ${i})">
              <div class="plugin-card-header">
                <div class="plugin-icon">${iconPlugin}</div>
                <div>
                  <div class="plugin-name">${escapeHtml(plugin.name)}</div>
                </div>
                <span class="plugin-scope ${plugin.scope}">${plugin.scope === 'user' ? '用户级' : '项目级'}</span>
              </div>
              <div class="plugin-description">版本: ${escapeHtml(plugin.version || '未知')}</div>
              <div class="plugin-meta">
                ${installDate ? `<div class="plugin-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>安装于 ${installDate}</div>` : ''}
              </div>
            </div>`;
        }
      }

      html += '</div>';
      tabContent.innerHTML = html;

      // 更新 tab 按钮状态
      document.querySelectorAll('.skills-plugins-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
    }

    let html = `
      <div class="skills-plugins-view">
        <div class="skills-plugins-header">
          <div class="skills-plugins-title">Skills & 插件</div>
          <div class="skills-plugins-tabs">
            <button class="skills-plugins-tab ${currentTab === 'skills' ? 'active' : ''}" data-tab="skills" onclick="document.dispatchEvent(new CustomEvent('switchTab', {detail: 'skills'}))">
              Skills (${skills.length})
            </button>
            <button class="skills-plugins-tab ${currentTab === 'plugins' ? 'active' : ''}" data-tab="plugins" onclick="document.dispatchEvent(new CustomEvent('switchTab', {detail: 'plugins'}))">
              插件 (${plugins.length})
            </button>
          </div>
          <button class="btn-action" onclick="document.getElementById('content').innerHTML='<div class=\\'content-empty\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><path d=\\'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\\'></path></svg><div class=\\'content-empty-text\\'>选择一个会话开始查看</div></div>'">${iconBack} 返回</button>
        </div>
        <div id="sp-tab-content"></div>
      </div>`;

    content.innerHTML = html;

    // 监听 tab 切换事件（先移除旧监听器防止泄漏）
    if (window._switchTabHandler) document.removeEventListener('switchTab', window._switchTabHandler);
    window._switchTabHandler = (e) => renderTab(e.detail);
    document.addEventListener('switchTab', window._switchTabHandler);

    // 初始渲染
    renderTab('skills');

  } catch(e) {
    content.innerHTML = `<div class="content-empty"><div class="content-empty-text">加载失败：${escapeHtml(e.message)}</div></div>`;
  }
}

document.addEventListener('click',()=>document.getElementById('contextMenu').classList.remove('show'));

function showContextMenu(e,sessionId,origName){
  e.preventDefault();
  e.stopPropagation();
  ctxSessionId=sessionId;
  ctxSessionName=origName;
  const menu=document.getElementById('contextMenu');

document.getElementById('ctxReset').addEventListener('click',async()=>{
  document.getElementById('contextMenu').classList.remove('show');
  await fetch('/api/custom-names',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:ctxSessionId,name:''})});
  delete customNames[ctxSessionId];

  // 只更新当前会话的显示名称
  const sessEl=document.getElementById('sess-'+ctxSessionId);

    const preview=sessEl.querySelector('.session-preview');

    sessEl.removeAttribute('title');
  }

  // 更新聊天标题
  if(currentSessionId===ctxSessionId){
    const chatTitle=document.querySelector('.chat-title');
    if(chatTitle){
      chatTitle.textContent=`会话 ${ctxSessionId.slice(0,8)}`;
      chatTitle.removeAttribute('title');
    }

function openRename(sessionId,currentName){
  const overlay=document.getElementById('renameOverlay');
  const input=document.getElementById('renameInput');
  ctxSessionId=sessionId;
  input.value=currentName;
  overlay.classList.add('show');
  setTimeout(()=>input.focus(),50);
}

function closeRename(){
  document.getElementById('renameOverlay').classList.remove('show');
}

async function confirmRename(){
  const input=document.getElementById('renameInput');
  const name=input.value.trim();
  closeRename();
  await fetch('/api/custom-names',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:ctxSessionId,name})});
  if(name)customNames[ctxSessionId]=name;
  else delete customNames[ctxSessionId];

  // 只更新当前会话的显示名称，不重新渲染整个列表
  const sessEl=document.getElementById('sess-'+ctxSessionId);
  if(sessEl){
    const preview=sessEl.querySelector('.session-preview');
    const origTitle=sessEl.getAttribute('data-orig')||'';
    if(preview){
      if(name){
        preview.textContent=name;
        sessEl.setAttribute('title',origTitle);
      }else{
        preview.textContent=origTitle;
        sessEl.removeAttribute('title');
      }
    }
  }

  // 更新聊天标题
  if(currentSessionId===ctxSessionId){
    const chatTitle=document.querySelector('.chat-title');
    if(chatTitle){
      const displayTitle=name||`会话 ${ctxSessionId.slice(0,8)}`;
      chatTitle.textContent=displayTitle;
      chatTitle.setAttribute('title',name?`原始: 会话 ${ctxSessionId.slice(0,8)}`:'');
    }
  }
}
