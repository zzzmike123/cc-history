<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 历史查看器</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>
    <span class="logo-text">CC History</span>
  </div>
  <div class="search-wrapper">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
    <input type="text" id="searchInput" placeholder="搜索消息... (Ctrl+K)" oninput="debounceSearch();toggleSearchClear()" onkeydown="if(event.key==='Escape'){this.value='';doSearch();toggleSearchClear();this.blur()}">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" title="清除搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="stats" id="stats"></div>
  <button class="btn-settings" onclick="showStats()" title="统计">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
  </button>
  <button class="btn-settings" onclick="showSkillsPlugins()" title="Skills & 插件">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
  </button>
  <button class="btn-settings" onclick="openSettings()" title="设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">项目</span>
      <span class="sidebar-count" id="sidebarCount"></span>
    </div>
    <div class="project-list" id="projectList">
      <div class="loading" id="loadingIndicator"><div class="spinner"></div> 加载中...</div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="content-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <div class="content-empty-text">选择一个会话开始查看</div>
    </div>
  </div>
</div>

<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" id="ctxRename">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    重命名
  </div>
  <div class="context-menu-item" id="ctxReset">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
    恢复默认
  </div>
</div>

<div class="rename-overlay" id="renameOverlay">
  <div class="rename-dialog">
    <h3>重命名会话</h3>
    <input type="text" id="renameInput" placeholder="输入新名称..." onkeydown="if(event.key==='Enter')confirmRename();if(event.key==='Escape')closeRename();">
    <div class="hint">原始名称将显示在鼠标悬浮提示中</div>
    <div class="btns">
      <button class="btn" onclick="closeRename()">取消</button>
      <button class="btn btn-primary" onclick="confirmRename()">确认</button>
    </div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-dialog">
    <h3>设置</h3>
    <div class="setting-group">
      <label class="setting-label">数据目录</label>
      <input type="text" class="setting-input" id="settingClaudeDir" placeholder="~/.claude">
      <div class="setting-hint">Claude Code 的 .claude 目录路径，修改后需重启应用</div>
    </div>
    <div class="setting-group">
      <label class="setting-label">主题</label>
      <div class="theme-switcher">
        <div class="theme-btn active" id="themeLight" onclick="selectTheme('light')">
          <div class="theme-preview light-preview"></div>
          <span class="theme-name">浅色</span>
        </div>
        <div class="theme-btn" id="themeDark" onclick="selectTheme('dark')">
          <div class="theme-preview dark-preview"></div>
          <span class="theme-name">深色</span>
        </div>
      </div>
    </div>
    <div class="settings-btns">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script src="/static/icons.js"></script>
<script src="/static/utils.js"></script>
<script>
let projects = [];
let searchTimer = null;
let currentSessionId = null;
let customNames = {};
let favorites = {};
let ctxSessionId = '';
let ctxSessionName = '';

document.addEventListener('keydown', e => {
  // Ctrl+K: 聚焦全局搜索
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }

  // Ctrl+F: 对话内搜索（仅在有会话打开时）
  if ((e.ctrlKey || e.metaKey) && e.key === 'f' && currentSessionId) {
    e.preventDefault();
    toggleChatSearch();
  }

  // Ctrl+E: 导出当前会话
  if ((e.ctrlKey || e.metaKey) && e.key === 'e' && currentSessionId) {
    e.preventDefault();
    exportSession(currentSessionId);
  }

  // Escape: 关闭弹窗
  if (e.key === 'Escape') {
    const settings = document.getElementById('settingsOverlay');
    if (settings && settings.classList.contains('show')) { closeSettings(); return; }
    const rename = document.getElementById('renameOverlay');
    if (rename && rename.classList.contains('show')) { closeRename(); return; }
    const chatSearch = document.getElementById('chatSearchBar');
    if (chatSearch && chatSearch.classList.contains('show')) { toggleChatSearch(); return; }
    const detailModal = document.querySelector('.detail-modal');
    if (detailModal) { detailModal.remove(); return; }
  }
});

function showProjectError(message) {
  document.getElementById('projectList').innerHTML = `
    <div class="state-box state-error">
      <div class="state-title">加载失败</div>
      <div class="state-desc">${escapeHtml(message || '无法读取 Claude Code 历史')}</div>
      <button class="state-action" onclick="loadProjects()">重试</button>
    </div>`;
}

async function loadProjects() {
  const list = document.getElementById('projectList');
  list.innerHTML = '<div class="loading" id="loadingIndicator"><div class="spinner"></div> 加载中...</div>';
  try {
    const [loadedProjects, loadedNames, loadedFavs] = await Promise.all([
      fetchJson('/api/projects'),
      fetchJson('/api/custom-names'),
      fetchJson('/api/favorites')
    ]);
    projects = Array.isArray(loadedProjects) ? loadedProjects : [];
    customNames = loadedNames && typeof loadedNames === 'object' ? loadedNames : {};
    favorites = loadedFavs && typeof loadedFavs === 'object' ? loadedFavs : {};

    let ts=0,tm=0;
    for(const p of projects){const ss=Array.isArray(p.sessions)?p.sessions:[];ts+=ss.length;for(const s of ss)tm+=Number(s.messageCount)||0;}
    document.getElementById('stats').innerHTML = `
      <div class="stat"><span class="stat-value">${projects.length}</span><span class="stat-label">项目</span></div>
      <div class="stat"><span class="stat-value">${ts}</span><span class="stat-label">会话</span></div>
      <div class="stat"><span class="stat-value">${tm}</span><span class="stat-label">消息</span></div>
    `;
    document.getElementById('sidebarCount').textContent = ts+' 会话';
    renderProjectList();
  } catch(e) {
    showProjectError(e.message);
  }
}

function renderProjectList(filter='') {
  const list=document.getElementById('projectList'), lf=String(filter||'').toLowerCase();
  if(!projects.length){
    list.innerHTML='<div class="state-box"><div class="state-title">没有找到历史会话</div><div class="state-desc">请确认 Claude Code 已产生历史记录，或检查 ~/.claude/projects 是否存在。</div></div>';
    return;
  }

  // 收集收藏的会话
  const favSessions = [];
  for(const proj of projects){
    const allSessions=Array.isArray(proj.sessions)?proj.sessions:[];
    const realPath=String(proj.realPath||proj.name||'');
    for(const s of allSessions){
      if(favorites[s.sessionId]){
        favSessions.push({...s, realPath, projectDir: proj.projectDir||''});
      }
    }
  }

  let html='';

  // 收藏分组
  if(favSessions.length && !lf){
    html+=`<div class="project-item expanded" id="proj-favorites">
      <div class="project-header" onclick="toggleProject('favorites')">
        <div class="project-arrow"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg></div>
        <div class="project-info">
          <div class="project-name">⭐ 收藏</div>
          <div class="project-path-text">${favSessions.length} 个会话</div>
        </div>
        <span class="project-badge">${favSessions.length}</span>
      </div>
      <div class="session-list">`;
    for(const s of favSessions){
      const rp=encodeURIComponent(s.realPath);
      const cn=customNames[s.sessionId];
      const dispName=cn?escapeHtml(cn):escapeHtml(s.firstMessage);
      const origTitle=cn?escapeHtml(s.firstMessage):'';
      const tooltip=cn?`title="${origTitle}"`:'';
      html+=`<div class="session-item" id="sess-fav-${s.sessionId}" data-realpath="${rp}" data-orig="${escapeHtml(s.firstMessage)}" ${tooltip}>
        <div class="session-top">
          <span class="session-time">${formatTime(s.lastTimestamp)}</span>
          <span class="session-right">
            <span class="session-fav active" onclick="event.stopPropagation();toggleFavorite('${s.sessionId}')" title="取消收藏">★</span>
            <span class="session-msgs">${s.messageCount}</span>
          </span>
        </div>
        <div class="session-preview" onclick="loadMessages('${encodeURIComponent(s.projectDir)}','${s.sessionId}','${rp}')">${dispName}</div>
      </div>`;
    }
    html+='</div></div>';
  }

  // 项目分组
  for(const proj of projects){
    const allSessions=Array.isArray(proj.sessions)?proj.sessions:[];
    const realPath=String(proj.realPath||proj.name||'');
    const sessions=allSessions.filter(s=>{if(!lf)return true;return String(s.firstMessage||'').toLowerCase().includes(lf)||realPath.toLowerCase().includes(lf);});
    if(!sessions.length&&lf)continue;
    const totalMsgs=sessions.reduce((a,s)=>a+s.messageCount,0);
    const projId=proj.name.replace(/[^a-zA-Z0-9]/g,'_');
    html+=`<div class="project-item" id="proj-${projId}">
      <div class="project-header" onclick="toggleProject('${projId}')">
        <div class="project-arrow"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"/></svg></div>
        <div class="project-info">
          <div class="project-name">${escapeHtml(realPath)}</div>
          <div class="project-path-text">${totalMsgs} 条消息</div>
        </div>
        <span class="project-badge">${sessions.length}</span>
      </div>
      <div class="session-list">`;
    for(const s of sessions){
      const rp=encodeURIComponent(realPath);
      const cn=customNames[s.sessionId];
      const dispName=cn?escapeHtml(cn):escapeHtml(s.firstMessage);
      const origTitle=cn?escapeHtml(s.firstMessage):'';
      const tooltip=cn?`title="${origTitle}"`:'';
      const isFav=favorites[s.sessionId];
      html+=`<div class="session-item" id="sess-${s.sessionId}" data-realpath="${rp}" data-orig="${escapeHtml(s.firstMessage)}" ${tooltip} onclick="loadMessages('${encodeURIComponent(proj.projectDir||'')}','${s.sessionId}','${rp}')" oncontextmenu="showContextMenu(event,'${s.sessionId}','${escapeHtml(s.firstMessage).replace(/'/g,"\\'")}')">
        <div class="session-top">
          <span class="session-time">${formatTime(s.lastTimestamp)}</span>
          <span class="session-right">
            <span class="session-fav ${isFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${s.sessionId}')" title="${isFav?'取消收藏':'收藏'}">${isFav?'★':'☆'}</span>
            <span class="session-msgs">${s.messageCount}</span>
          </span>
        </div>
        <div class="session-preview">${dispName}</div>
      </div>`;
    }
    html+='</div></div>';
  }
  if(!html)html='<div class="search-empty">没有匹配的结果</div>';
  list.innerHTML=html;
}

async function toggleFavorite(sessionId) {
  try {
    const data = await fetchJson('/api/favorites', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sessionId})
    });
    if(data.favorited) favorites[sessionId] = true;
    else delete favorites[sessionId];
    renderProjectList();
  } catch(e) { console.error(e); }
}

function toggleProject(id){const el=document.getElementById('proj-'+id);if(el)el.classList.toggle('expanded');}

async function loadMessages(encodedProjectDir,sessionId,encodedRealPath,searchKeyword){
  if(currentSessionId===sessionId && !searchKeyword)return;
  currentSessionId=sessionId;

  // 清理旧的搜索状态，防止内存泄漏
  window._chatMessages = null;
  window._chatSearchResults = [];
  window._chatSearchIndex = -1;
  clearTimeout(chatSearchTimer);

  document.querySelectorAll('.session-item').forEach(el=>el.classList.remove('active'));
  const sessEl=document.getElementById('sess-'+sessionId);
  if(sessEl){sessEl.classList.add('active');const p=sessEl.closest('.project-item');if(p&&!p.classList.contains('expanded'))p.classList.add('expanded');}
  const projectDir=decodeURIComponent(encodedProjectDir);
  const realPath=decodeURIComponent(encodedRealPath||'');
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div> 加载中...</div>';
  let messages=[];
  try {
    messages=await fetchJson(`/api/messages?projectDir=${encodeURIComponent(projectDir)}&sessionId=${encodeURIComponent(sessionId)}`);
  } catch(e) {
    content.innerHTML=`<div class="content-empty"><div class="content-empty-text">读取会话失败：${escapeHtml(e.message)}</div></div>`;
    return;
  }
  if(!messages.length){content.innerHTML='<div class="content-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;opacity:0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><div class="content-empty-text">该会话没有可显示的消息</div></div>';return;}
  const cn=customNames[sessionId];
  const chatTitle=cn||`会话 ${sessionId.slice(0,8)}`;
  const titleTooltip=cn?`title="原始: 会话 ${sessionId.slice(0,8)}"`:'';
  let html=`<div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-title" ${titleTooltip}>${escapeHtml(chatTitle)}</div>
      <div class="chat-meta">
        <span class="chat-meta-item">${iconFolder} ${escapeHtml(realPath||projectDir)}</span>
        <span class="chat-meta-item">${iconMsg} ${messages.length} 条消息</span>
      </div>
    </div>
    <div class="chat-actions">
      <button class="btn-action" onclick="toggleChatSearch()" title="在对话中搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        搜索
      </button>
      <button class="btn-action" onclick="exportSession('${sessionId}')" title="导出为 Markdown">
        ${iconExport} 导出
      </button>
      <button class="btn-resume" onclick="resumeSession('${sessionId}','${encodeURIComponent(realPath)}')" title="在 PowerShell 中继续此对话">
        ${iconTerminal} 继续对话
      </button>
    </div>
  </div>
  <div class="chat-search-bar" id="chatSearchBar">
    <input type="text" class="chat-search-input" id="chatSearchInput" placeholder="搜索对话内容..." oninput="debounceChatSearch()" onkeydown="if(event.key==='Escape'){toggleChatSearch()}else if(event.key==='Enter'){chatSearchNext()}">
    <span class="chat-search-info" id="chatSearchInfo"></span>
    <button class="chat-search-btn" onclick="chatSearchPrev()" title="上一个">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>
    <button class="chat-search-btn" onclick="chatSearchNext()" title="下一个">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
    <button class="chat-search-close" onclick="toggleChatSearch()" title="关闭搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="messages" id="chatMessages">`;

  // 分页：初始只渲染最后 PAGE_SIZE 条
  const PAGE_SIZE = 50;
  const totalMsgs = messages.length;
  const startIdx = Math.max(0, totalMsgs - PAGE_SIZE);

  if (startIdx > 0) {
    html += `<div class="load-more-info">共 ${totalMsgs} 条消息，显示最近 ${PAGE_SIZE} 条</div>`;
    html += `<button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreMessages()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
      加载更早的消息
    </button>`;
  }

  for(let i = startIdx; i < totalMsgs; i++){
    const msg = messages[i];
    const av=msg.role==='user'?iconUser:iconBot;
    html+=`<div class="message ${msg.role}" data-idx="${i}">
      <div class="msg-avatar">${av}</div>
      <div class="msg-body"><div class="msg-bubble" data-raw="${escapeHtml(msg.content)}">${renderMarkdown(msg.content)}</div><div class="msg-time">${formatTime(msg.timestamp)}</div></div>
    </div>`;
  }
  html+='</div>';
  content.innerHTML=html;

  // 存储原始消息用于搜索和分页
  window._chatMessages = messages;
  window._chatSearchResults = [];
  window._chatSearchIndex = -1;
  window._chatLoadedCount = PAGE_SIZE;

  // 滚动到底部
  const msgContainer = document.getElementById('chatMessages');
  if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;

  // 如果有搜索关键词，自动打开搜索并定位
  if (searchKeyword) {
    const keyword = decodeURIComponent(searchKeyword);
    toggleChatSearch();
    const input = document.getElementById('chatSearchInput');
    if (input) {
      input.value = keyword;
      doChatSearch();
    }
  }
}

function loadMoreMessages() {
  const messages = window._chatMessages;
  if (!messages) return;

  const PAGE_SIZE = 50;
  const loaded = window._chatLoadedCount || 0;
  const total = messages.length;
  const newLoaded = Math.min(loaded + PAGE_SIZE, total);
  const startIdx = total - newLoaded;
  const endIdx = total - loaded;

  if (startIdx >= endIdx) return;

  // 记录当前滚动位置
  const container = document.getElementById('chatMessages');
  const oldScrollHeight = container ? container.scrollHeight : 0;

  // 渲染新消息
  let html = '';
  for (let i = startIdx; i < endIdx; i++) {
    const msg = messages[i];
    const av = msg.role === 'user' ? iconUser : iconBot;
    html += `<div class="message ${msg.role}" data-idx="${i}">
      <div class="msg-avatar">${av}</div>
      <div class="msg-body"><div class="msg-bubble" data-raw="${escapeHtml(msg.content)}">${renderMarkdown(msg.content)}</div><div class="msg-time">${formatTime(msg.timestamp)}</div></div>
    </div>`;
  }

  // 移除旧的加载按钮和信息
  const oldBtn = document.getElementById('loadMoreBtn');
  const oldInfo = container.querySelector('.load-more-info');
  if (oldBtn) oldBtn.remove();
  if (oldInfo) oldInfo.remove();

  // 在消息列表开头插入
  const firstMsg = container.querySelector('.message');
  if (firstMsg) {
    firstMsg.insertAdjacentHTML('beforebegin', html);
  } else {
    container.innerHTML = html + container.innerHTML;
  }

  // 添加新的加载按钮（如果还有更多）
  window._chatLoadedCount = newLoaded;
  if (startIdx > 0) {
    const infoHtml = `<div class="load-more-info">共 ${total} 条消息，已显示 ${newLoaded} 条</div>`;
    const btnHtml = `<button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreMessages()">

    </button>`;
    const firstMsgNow = container.querySelector('.message');
    if (firstMsgNow) {
      firstMsgNow.insertAdjacentHTML('beforebegin', infoHtml + btnHtml);
    }
  }

  // 保持滚动位置不变
  if (container) {
    const newScrollHeight = container.scrollHeight;
    container.scrollTop = newScrollHeight - oldScrollHeight;
  }

  // 如果有搜索关键词，重新高亮
  const searchInput = document.getElementById('chatSearchInput');
  if (searchInput && searchInput.value.trim()) {
    doChatSearch();
  }
}

// 在文本节点中高亮关键词（不破坏 HTML 结构）
function highlightInElement(element, keyword) {
  const highlights = [];
  const regex = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');

  // 使用 TreeWalker 遍历所有文本节点
  const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(node => {
    const text = node.textContent;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;

    // 创建文档片段替换文本节点
    const frag = document.createDocumentFragment();
    let lastIdx = 0;
    regex.lastIndex = 0;  // test() 会推进 lastIndex，exec 前需重置
    let match;

    while ((match = regex.exec(text)) !== null) {
      // 匹配前的文本
      if (match.index > lastIdx) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      }
      // 高亮的匹配文本
      const span = document.createElement('span');
      span.className = 'search-highlight';
      span.textContent = match[0];
      frag.appendChild(span);
      highlights.push(span);
      lastIdx = match.index + match[0].length;
    }
    // 剩余文本
    if (lastIdx < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
    node.parentNode.replaceChild(frag, node);
  });

  return highlights;
}

let chatSearchTimer = null;
function debounceChatSearch() { clearTimeout(chatSearchTimer); chatSearchTimer = setTimeout(doChatSearch, 200); }

function doChatSearch() {
  const input = document.getElementById('chatSearchInput');
  const info = document.getElementById('chatSearchInfo');
  if (!input || !info) return;

  const keyword = input.value.trim();
  clearChatSearch();

  if (!keyword) {
    info.textContent = '';
    return;
  }

  // 搜索并高亮
  const results = [];
  document.querySelectorAll('.msg-bubble').forEach(bubble => {
    const raw = bubble.getAttribute('data-raw');
    if (!raw) return;

    const lower = raw.toLowerCase();
    if (!lower.includes(keyword.toLowerCase())) return;

    // 先渲染 markdown
    bubble.innerHTML = renderMarkdown(raw);
    // 然后在渲染后的 DOM 中高亮
    const highlights = highlightInElement(bubble, keyword);
    results.push(...highlights);
  });

  window._chatSearchResults = results;
  window._chatSearchIndex = results.length > 0 ? 0 : -1;

  if (results.length > 0) {
    info.textContent = `1/${results.length}`;
    results[0].classList.add('active');
    results[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    info.textContent = '无结果';
  }
}

function chatSearchNext() {
  const results = window._chatSearchResults || [];
  if (results.length === 0) return;

  // 移除当前高亮
  if (window._chatSearchIndex >= 0 && window._chatSearchIndex < results.length) {
    results[window._chatSearchIndex].classList.remove('active');
  }

  // 移动到下一个
  window._chatSearchIndex = (window._chatSearchIndex + 1) % results.length;
  results[window._chatSearchIndex].classList.add('active');
  results[window._chatSearchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

  const info = document.getElementById('chatSearchInfo');
  if (info) info.textContent = `${window._chatSearchIndex + 1}/${results.length}`;
}

function chatSearchPrev() {
  const results = window._chatSearchResults || [];
  if (results.length === 0) return;

  // 移除当前高亮
  if (window._chatSearchIndex >= 0 && window._chatSearchIndex < results.length) {
    results[window._chatSearchIndex].classList.remove('active');
  }

  // 移动到上一个
  window._chatSearchIndex = (window._chatSearchIndex - 1 + results.length) % results.length;
  results[window._chatSearchIndex].classList.add('active');
  results[window._chatSearchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

  const info = document.getElementById('chatSearchInfo');
  if (info) info.textContent = `${window._chatSearchIndex + 1}/${results.length}`;
}

  const claudeDir = document.getElementById('settingClaudeDir').value.trim();
  const theme = document.getElementById('themeDark').classList.contains('active') ? 'dark' : 'light';

  try {

async function exportSession(sessionId) {
  try {
    const res = await fetch(`/api/export?sessionId=${encodeURIComponent(sessionId)}`);
    if (!res.ok) throw new Error('导出失败');
    const content = await res.text();
    const filename = `session-${sessionId.slice(0,8)}.md`;

    // 优先用 pywebview 原生保存对话框
    if (window.pywebview && window.pywebview.api) {
      const result = await window.pywebview.api.save_file(filename, content);
      if (result.ok) {
        alert('导出成功！\n' + result.path);
        return;
      }
      // 用户取消了对话框
      return;
    }

    // 回退：浏览器下载
    const blob = new Blob([content], {type: 'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败: ' + e.message);
  }
}

        <div class="stats-card"><div class="stats-card-value">${stats.totalSessions}</div><div class="stats-card-label">会话</div></div>
        <div class="stats-card"><div class="stats-card-value">${stats.totalMessages}</div><div class="stats-card-label">消息</div></div>
      </div>

      <!-- 30天趋势 -->
      <div class="stats-section">
        <div class="stats-section-title">最近 30 天消息趋势</div>
        <div class="stats-trend">
          <div class="stats-trend-bars">`;

    const maxTrend = Math.max(...stats.trend.map(d => d.count), 1);
    for (const d of stats.trend) {
      const h = Math.max(2, Math.round((d.count / maxTrend) * 100));
      const day = d.date.slice(5); // MM-DD
      html += `<div class="stats-trend-col" title="${d.date}: ${d.count}条">
        <div class="stats-trend-bar" style="height:${h}%"></div>
        <div class="stats-trend-label">${day.slice(-2)}</div>
      </div>`;
    }

    html += `</div></div></div>

      <!-- 每小时分布 -->
      <div class="stats-section">
        <div class="stats-section-title">每小时活跃分布</div>
        <div class="stats-hours">`;

    const maxHour = Math.max(...stats.hourly, 1);
    for (let h = 0; h < 24; h++) {
      const pct = Math.round((stats.hourly[h] / maxHour) * 100);
      html += `<div class="stats-hour-col">
        <div class="stats-hour-bar" style="height:${Math.max(2, pct)}%"></div>
        <div class="stats-hour-label">${h}</div>
      </div>`;
    }

    html += `</div></div>

      <!-- 每周分布 -->
      <div class="stats-section">
        <div class="stats-section-title">每周活跃分布</div>
        <div class="stats-weekdays">`;

    const weekNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    const maxWeek = Math.max(...stats.weekday, 1);
    for (let d = 0; d < 7; d++) {
      const pct = Math.round((stats.weekday[d] / maxWeek) * 100);
      html += `<div class="stats-weekday-col">
        <div class="stats-weekday-bar" style="height:${Math.max(2, pct)}%"></div>
        <div class="stats-weekday-label">${weekNames[d]}</div>
      </div>`;
    }

    html += `</div></div>

      <!-- 工具使用 -->
      <div class="stats-section">
        <div class="stats-section-title">工具使用排行（共 ${toolTotal} 次）</div>
        <div class="stats-tools">`;

    const tools = Object.entries(stats.toolUsage || {});
    for (let i = 0; i < tools.length; i++) {
      const [name, count] = tools[i];
      const pct = Math.round((count / toolTotal) * 100);
      const color = toolColors[i % toolColors.length];
      html += `<div class="stats-tool-item">
        <div class="stats-tool-name">${escapeHtml(name)}</div>
        <div class="stats-tool-track"><div class="stats-tool-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="stats-tool-value">${count} <span style="color:var(--text-muted)">(${pct}%)</span></div>
      </div>`;
    }

    html += `</div></div>

      <!-- 项目消息排行 -->
      <div class="stats-section">
        <div class="stats-section-title">项目消息排行</div>`;

    const maxMsgs = Math.max(...stats.byProject.map(p => p.messages), 1);
    for (const p of stats.byProject) {
      const pct = Math.round((p.messages / maxMsgs) * 100);
      html += `<div class="stats-bar-item">
        <div class="stats-bar-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
        <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%"></div></div>
        <div class="stats-bar-value">${p.messages}</div>
      </div>`;
    }

    html += '</div></div>';
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = `<div class="content-empty"><div class="content-empty-text">加载统计失败：${escapeHtml(e.message)}</div></div>`;
  }
}

                ${installDate ? `<div class="plugin-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>安装于 ${installDate}</div>` : ''}
              </div>
            </div>`;
        }
      }

      html += '</div>';
      tabContent.innerHTML = html;

      // 更新 tab 按钮状态
      document.querySelectorAll('.skills-plugins-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
    }

    let html = `
      <div class="skills-plugins-view">
        <div class="skills-plugins-header">
          <div class="skills-plugins-title">Skills & 插件</div>
          <div class="skills-plugins-tabs">
            <button class="skills-plugins-tab ${currentTab === 'skills' ? 'active' : ''}" data-tab="skills" onclick="document.dispatchEvent(new CustomEvent('switchTab', {detail: 'skills'}))">
              Skills (${skills.length})
            </button>
            <button class="skills-plugins-tab ${currentTab === 'plugins' ? 'active' : ''}" data-tab="plugins" onclick="document.dispatchEvent(new CustomEvent('switchTab', {detail: 'plugins'}))">
              插件 (${plugins.length})
            </button>
          </div>
          <button class="btn-action" onclick="document.getElementById('content').innerHTML='<div class=\\'content-empty\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><path d=\\'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\\'></path></svg><div class=\\'content-empty-text\\'>选择一个会话开始查看</div></div>'">${iconBack} 返回</button>
        </div>
        <div id="sp-tab-content"></div>
      </div>`;

    content.innerHTML = html;

    // 监听 tab 切换事件（先移除旧监听器防止泄漏）
    if (window._switchTabHandler) document.removeEventListener('switchTab', window._switchTabHandler);
    window._switchTabHandler = (e) => renderTab(e.detail);
    document.addEventListener('switchTab', window._switchTabHandler);

    // 初始渲染
    renderTab('skills');

  } catch(e) {
    content.innerHTML = `<div class="content-empty"><div class="content-empty-text">加载失败：${escapeHtml(e.message)}</div></div>`;
  }
}

// Context Menu
document.addEventListener('click',()=>document.getElementById('contextMenu').classList.remove('show'));

function showContextMenu(e,sessionId,origName){
  e.preventDefault();
  e.stopPropagation();
  ctxSessionId=sessionId;
  ctxSessionName=origName;
  const menu=document.getElementById('contextMenu');
  menu.style.left=e.clientX+'px';
  menu.style.top=e.clientY+'px';
  menu.classList.add('show');
}

document.getElementById('ctxRename').addEventListener('click',()=>{
  document.getElementById('contextMenu').classList.remove('show');
  openRename(ctxSessionId,customNames[ctxSessionId]||'');
});

document.getElementById('ctxReset').addEventListener('click',async()=>{
  document.getElementById('contextMenu').classList.remove('show');
  await fetch('/api/custom-names',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:ctxSessionId,name:''})});
  delete customNames[ctxSessionId];

  // 只更新当前会话的显示名称
  const sessEl=document.getElementById('sess-'+ctxSessionId);
  if(sessEl){
    const preview=sessEl.querySelector('.session-preview');
    const origTitle=sessEl.getAttribute('data-orig')||'';
    if(preview) preview.textContent=origTitle;
    sessEl.removeAttribute('title');
  }

  // 更新聊天标题
  if(currentSessionId===ctxSessionId){
    const chatTitle=document.querySelector('.chat-title');
    if(chatTitle){
      chatTitle.textContent=`会话 ${ctxSessionId.slice(0,8)}`;
      chatTitle.removeAttribute('title');
    }
  }
});

function openRename(sessionId,currentName){
  const overlay=document.getElementById('renameOverlay');
  const input=document.getElementById('renameInput');
  ctxSessionId=sessionId;
  input.value=currentName;
  overlay.classList.add('show');
  setTimeout(()=>input.focus(),50);
}

function closeRename(){
  document.getElementById('renameOverlay').classList.remove('show');
}

async function confirmRename(){
  const input=document.getElementById('renameInput');
  const name=input.value.trim();
  closeRename();
  await fetch('/api/custom-names',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:ctxSessionId,name})});
  if(name)customNames[ctxSessionId]=name;
  else delete customNames[ctxSessionId];

  // 只更新当前会话的显示名称，不重新渲染整个列表
  const sessEl=document.getElementById('sess-'+ctxSessionId);
  if(sessEl){
    const preview=sessEl.querySelector('.session-preview');
    const origTitle=sessEl.getAttribute('data-orig')||'';
    if(preview){
      if(name){
        preview.textContent=name;
        sessEl.setAttribute('title',origTitle);
      }else{
        preview.textContent=origTitle;
        sessEl.removeAttribute('title');
      }
    }
  }

  // 更新聊天标题
  if(currentSessionId===ctxSessionId){
    const chatTitle=document.querySelector('.chat-title');
    if(chatTitle){
      const displayTitle=name||`会话 ${ctxSessionId.slice(0,8)}`;
      chatTitle.textContent=displayTitle;
      chatTitle.setAttribute('title',name?`原始: 会话 ${ctxSessionId.slice(0,8)}`:'');
    }
  }
}
</script>
</body>
